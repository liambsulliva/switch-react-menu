name: Deploy embed to liamsullivan.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-liamsullivan-subpath
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_SLUG: ${{ vars.SITE_BASE_PATH || 'switch-menu' }}
      MAIN_SITE_REPO: ${{ vars.MAIN_SITE_REPO || 'liambsulliva/personal-website-v2' }}
      MAIN_SITE_PUBLIC_DIR: ${{ vars.MAIN_SITE_PUBLIC_DIR || 'public' }}
    steps:
      - name: Validate configuration
        env:
          MAIN_SITE_PUSH_TOKEN: ${{ secrets.MAIN_SITE_PUSH_TOKEN }}
        run: |
          if [ -z "$MAIN_SITE_REPO" ]; then
            echo "Set repository variable MAIN_SITE_REPO (e.g. liambsulliva/personal-website-v2)."
            exit 1
          fi
          if [ -z "$MAIN_SITE_PUSH_TOKEN" ]; then
            echo "MAIN_SITE_PUSH_TOKEN is missing."
            echo "Add it under switch-react-menu → Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi
          echo "MAIN_SITE_PUSH_TOKEN is configured."
          echo "Deploy target: $MAIN_SITE_REPO (public/$SITE_SLUG)"
          echo "RAWG requests use the Astro proxy; configure RAWG_API_KEY in Vercel."

      - name: Checkout switch-react-menu
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build browser embed bundle
        run: npm run build:pages
        env:
          SITE_BASE_PATH: /${{ env.SITE_SLUG }}/
          VITE_RAWG_PROXY_BASE: /api/rawg

      - name: Checkout main site
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MAIN_SITE_REPO }}
          token: ${{ secrets.MAIN_SITE_PUSH_TOKEN }}
          path: main-site

      - name: Sync embed bundle into main site
        run: |
          TARGET="main-site/${MAIN_SITE_PUBLIC_DIR}/${SITE_SLUG}"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r dist/browser/* "$TARGET/"

      - name: Commit and push to main site
        working-directory: main-site
        env:
          SITE_SLUG: ${{ env.SITE_SLUG }}
          MAIN_SITE_PUBLIC_DIR: ${{ env.MAIN_SITE_PUBLIC_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MAIN_SITE_PUBLIC_DIR}/${SITE_SLUG}"
          if git diff --staged --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "chore(embed): update switch-menu from switch-react-menu@${GITHUB_SHA::7}"
          git push

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK not set; relying on Vercel's git push deploy."
          fi
