name: Deploy embed to liamsullivan.com

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-liamsullivan-subpath
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_SLUG: ${{ vars.SITE_BASE_PATH || 'switch-menu' }}
      MAIN_SITE_REPO: ${{ vars.MAIN_SITE_REPO }}
      MAIN_SITE_PUBLIC_DIR: ${{ vars.MAIN_SITE_PUBLIC_DIR || 'public' }}
    steps:
      - name: Validate configuration
        run: |
          if [ -z "$MAIN_SITE_REPO" ]; then
            echo "Set repository variable MAIN_SITE_REPO (e.g. liambsulliva/your-site)."
            exit 1
          fi
          if [ -z "${{ secrets.MAIN_SITE_PUSH_TOKEN }}" ]; then
            echo "Set secret MAIN_SITE_PUSH_TOKEN with write access to the main site repo."
            exit 1
          fi

      - name: Checkout switch-react-menu
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build browser embed bundle
        run: npm run build:pages
        env:
          SITE_BASE_PATH: /${{ env.SITE_SLUG }}/

      - name: Checkout main site
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MAIN_SITE_REPO }}
          token: ${{ secrets.MAIN_SITE_PUSH_TOKEN }}
          path: main-site

      - name: Sync embed bundle into main site
        run: |
          TARGET="main-site/${MAIN_SITE_PUBLIC_DIR}/${SITE_SLUG}"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r dist/browser/* "$TARGET/"

      - name: Commit and push to main site
        working-directory: main-site
        env:
          SITE_SLUG: ${{ env.SITE_SLUG }}
          MAIN_SITE_PUBLIC_DIR: ${{ env.MAIN_SITE_PUBLIC_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MAIN_SITE_PUBLIC_DIR}/${SITE_SLUG}"
          if git diff --staged --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "chore(embed): update switch-menu from switch-react-menu@${GITHUB_SHA::7}"
          git push

      - name: Trigger Vercel deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
